<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>とうきょう でんしゃ たび</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Nunito:wght@700;800;900&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1923;
  --card: #1a2634;
  --card2: #1e2d3d;
  --border: rgba(255,255,255,0.08);
  --text: #ffffff;
  --text-dim: rgba(255,255,255,0.5);
  --text-faint: rgba(255,255,255,0.25);
  --accent: #00c8ff;
  /* Line colours */
  --yamanote: #9acd32;
  --ginza: #f5821f;
  --hibiya: #9b7cb6;
  --namboku: #00ada9;
  --mita: #0079c2;
  --tozai: #ef353a;
  --chiyoda: #00bb85;
  --fukutoshin: #9b5c2a;
  --keikyu: #e60012;
  --tokaido: #f15a22;
}

body {
  font-family: 'Nunito', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 16px;
}

#app { width: 100%; max-width: 560px; }

.screen { display: none; }
.screen.active { display: block; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

/* ── HOME SCREEN ── */
.home-header {
  text-align: center;
  padding: 28px 0 24px;
}
.home-logo {
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}
.home-title {
  font-size: clamp(28px, 8vw, 40px);
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 4px;
}
.home-title .jp { font-family: 'Noto Sans JP', sans-serif; display: block; font-size: clamp(20px,5vw,28px); color: var(--text-dim); font-weight: 700; }
.home-subtitle { font-size: 14px; color: var(--text-dim); margin-top: 8px; }

.section-label {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-faint);
  margin: 24px 0 10px;
}

.journey-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 14px;
}
.journey-card:hover { background: var(--card2); border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }
.journey-card:active { transform: scale(0.98); }

.journey-diff {
  font-size: 18px;
  min-width: 28px;
  text-align: center;
}
.journey-info { flex: 1; min-width: 0; }
.journey-name { font-size: 16px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.journey-meta { font-size: 12px; color: var(--text-dim); margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
.line-pip {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 50%;
  margin-right: 3px;
  vertical-align: middle;
}
.journey-count { font-size: 12px; color: var(--text-faint); font-weight: 700; }

/* ── JOURNEY SCREEN ── */
.journey-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 0 12px;
}
.back-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 20px;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s;
}
.back-btn:hover { background: var(--card2); }
.journey-title-wrap { flex: 1; min-width: 0; }
.journey-title-main { font-size: 15px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.journey-title-sub { font-size: 12px; color: var(--text-dim); }

/* Progress map */
.route-map {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  overflow-x: auto;
}
.route-map-inner { display: flex; align-items: center; gap: 0; min-width: max-content; padding: 8px 4px; }
.route-dot {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 3px solid #444;
  background: var(--bg);
  flex-shrink: 0;
  transition: all 0.3s;
  position: relative;
}
.route-dot.done { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px rgba(0,200,255,0.5); }
.route-dot.current { background: white; border-color: white; box-shadow: 0 0 12px rgba(255,255,255,0.6); transform: scale(1.2); }
.route-dot.future { background: var(--bg); border-color: #333; }
.route-dot.terminus { width: 26px; height: 26px; }
.route-seg {
  height: 4px;
  width: 28px;
  flex-shrink: 0;
  border-radius: 2px;
}
.route-station-label {
  position: absolute;
  top: 28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  font-weight: 700;
  color: var(--text-dim);
  white-space: nowrap;
  font-family: 'Noto Sans JP', sans-serif;
}

/* Station board */
.station-board {
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 16px;
  border: 3px solid;
}
.board-line-bar {
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}
.board-body {
  background: #f5f0e8;
  padding: 20px 20px 16px;
  text-align: center;
}
.board-furigana {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: clamp(14px, 4vw, 20px);
  color: #333;
  letter-spacing: 4px;
  margin-bottom: 4px;
  min-height: 28px;
  transition: opacity 0.2s;
}
.board-furigana.hidden { opacity: 0; }
.board-kanji {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: clamp(36px, 12vw, 64px);
  font-weight: 900;
  color: #1a1a1a;
  line-height: 1;
  margin-bottom: 6px;
  letter-spacing: 2px;
}
.board-romaji {
  font-size: clamp(13px, 3.5vw, 17px);
  font-weight: 700;
  color: #555;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.board-landmark {
  display: inline-block;
  background: rgba(0,0,0,0.07);
  border-radius: 8px;
  padding: 4px 12px;
  font-size: 12px;
  color: #555;
  font-weight: 700;
}

/* Nav arrows + info */
.station-nav {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.nav-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  color: var(--text);
  font-size: 22px;
  height: 56px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.nav-btn:hover:not(:disabled) { background: var(--card2); border-color: rgba(255,255,255,0.3); }
.nav-btn:disabled { opacity: 0.25; cursor: default; }
.nav-btn.prev { width: 56px; }
.nav-btn.next {
  flex: 1;
  font-family: 'Nunito', sans-serif;
  font-size: 17px;
  font-weight: 800;
  gap: 8px;
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}
.nav-btn.next:hover { background: #33d4ff; }
.nav-btn.next:disabled { background: var(--card); color: var(--text-dim); border-color: var(--border); }
.nav-btn.finish {
  background: #2ecc71;
  border-color: #2ecc71;
  color: #000;
}
.nav-btn.finish:hover { background: #48e88a; }

/* Furigana toggle */
.furigana-toggle {
  display: flex;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 16px;
}
.ftog-btn {
  flex: 1;
  padding: 10px 8px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-family: 'Nunito', 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.15s;
}
.ftog-btn.active { background: var(--accent); color: #000; }

/* Station counter */
.station-counter {
  text-align: center;
  font-size: 13px;
  color: var(--text-dim);
  font-weight: 700;
  margin-bottom: 12px;
}

/* ── COMPLETION SCREEN ── */
.completion {
  text-align: center;
  padding: 32px 0;
}
.completion-emoji { font-size: 72px; margin-bottom: 12px; }
.completion-title { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
.completion-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 20px; color: var(--text-dim); margin-bottom: 20px; }
.completion-stats {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 24px;
  display: flex;
  justify-content: space-around;
}
.stat-item { text-align: center; }
.stat-num { font-size: 32px; font-weight: 900; color: var(--accent); }
.stat-label { font-size: 12px; color: var(--text-dim); font-weight: 700; margin-top: 4px; }
.done-btn {
  display: block;
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  font-family: 'Nunito', sans-serif;
  font-size: 20px;
  font-weight: 900;
  cursor: pointer;
  margin-bottom: 10px;
  transition: all 0.15s;
}
.done-btn.primary { background: var(--accent); color: #000; }
.done-btn.secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); font-size: 16px; }
.done-btn:hover { opacity: 0.9; transform: translateY(-1px); }
</style>
</head>

      <div class="journey-title-sub" id="jt-sub"></div>
    </div>
  </div>
  <div class="route-map"><div class="route-map-inner" id="route-map-inner"></div></div>
  <div class="station-counter" id="station-counter"></div>

  </div>
  <div class="station-nav">

    <button class="nav-btn next" id="next-btn" onclick="nextStation()">Next station →</button>
  </div>
</div>

<!-- COMPLETION -->
<div id="completion-screen" class="screen">
  <div class="completion">
    <div class="completion-emoji">🎉</div>
    <div class="completion-title">ゴール！</div>
    <div class="completion-jp" id="comp-subtitle"></div>
    <div class="completion-stats">
      <div class="stat-item"><div class="stat-num" id="comp-stations"></div><div class="stat-label">stations</div></div>
      <div class="stat-item"><div class="stat-num" id="comp-lines"></div><div class="stat-label">lines</div></div>
      <div class="stat-item"><div class="stat-num" id="comp-changes"></div><div class="stat-label">changes</div></div>
    </div>
    <button class="done-btn primary" onclick="replayJourney()">🔄 Ride again!</button>
    <button class="done-btn secondary" onclick="goHome()">🏠 Choose another journey</button>
  </div>
</div>

</div><!-- #app -->

    stations: [

      { kanji:'浅草',   hira:'あさくさ', kata:'アサクサ', romaji:'Asakusa', line:'ginza', landmark:'⛩️ Senso-ji Temple' },

  {
    id: 'j7',
    name: 'Tokyo to Shinagawa',
    nameJp: '東京 → 品川',
    diff: 1,

    stations: [
      { kanji:'東京',   hira:'とうきょう', kata:'トウキョウ', romaji:'Tokyo',      line:'yamanote', landmark:'🚄 Shinkansen Hub' },

      { kanji:'田町',   hira:'たまち',     kata:'タマチ',     romaji:'Tamachi',    line:'yamanote', landmark:'⚓ Seaside Park' },
      { kanji:'品川',   hira:'しながわ',   kata:'シナガワ',   romaji:'Shinagawa',  line:'keikyu',   landmark:'🐧 Penguin Aquarium' },
    ]
  },
  {
    id: 'j8',

      { kanji:'広尾',     hira:'ひろお',       kata:'ヒロオ',       romaji:'Hiroo',      line:'hibiya',   landmark:'🌿 French School' },
      { kanji:'恵比寿',   hira:'えびす',       kata:'エビス',       romaji:'Ebisu',      line:'yamanote', landmark:'🍺 Yebisu Beer Museum' },
      { kanji:'渋谷',     hira:'しぶや',       kata:'シブヤ',       romaji:'Shibuya',    line:'yamanote', landmark:'🐕 Hachiko Statue' },

// =====================================================================
// STATE
// =====================================================================
let currentJourney = null;
let currentStationIdx = 0;
let furiganaMode = 'hiragana'; // 'hiragana' | 'katakana' | 'none'

// =====================================================================
// HOME SCREEN
// =====================================================================
function renderHome() {
  const list = document.getElementById('journey-list');
  list.innerHTML = '';
  JOURNEYS.forEach(j => {
    const card = document.createElement('div');
    card.className = 'journey-card';
    const diffEmoji = j.diff === 1 ? '🟢' : j.diff === 2 ? '🟡' : '🔴';
    const linesPips = j.lines.map(l =>
      `<span><span class="line-pip" style="background:${LINES[l].color}"></span>${LINES[l].en}</span>`
    ).join('');
    card.innerHTML = `
      <div class="journey-diff">${diffEmoji}</div>
      <div class="journey-info">
        <div class="journey-name">${j.name} <span style="color:var(--text-faint);font-size:13px;">${j.nameJp}</span></div>
        <div class="journey-meta">${linesPips}</div>
      </div>
      <div class="journey-count">${j.stations.length} stops</div>
    `;
    card.onclick = () => startJourney(j.id);
    list.appendChild(card);
  });
}

// =====================================================================
// JOURNEY
// =====================================================================
function startJourney(id) {
  currentJourney = JOURNEYS.find(j => j.id === id);
  currentStationIdx = 0;
  showScreen('journey-screen');
  document.getElementById('jt-main').textContent = currentJourney.name;
  document.getElementById('jt-sub').textContent = currentJourney.nameJp;
  renderRouteMap();
  renderStation();
}

function renderRouteMap() {
  const j = currentJourney;
  const container = document.getElementById('route-map-inner');
  container.innerHTML = '';

  j.stations.forEach((st, i) => {
    const lineColor = LINES[st.line]?.color || '#888';
    const dot = document.createElement('div');
    dot.className = 'route-dot' + (i === 0 || i === j.stations.length-1 ? ' terminus' : '');
    dot.id = `rdot-${i}`;
    const label = document.createElement('div');
    label.className = 'route-station-label';
    label.style.fontFamily = "'Noto Sans JP', sans-serif";
    label.textContent = st.kanji;
    dot.appendChild(label);
    container.appendChild(dot);

    if (i < j.stations.length - 1) {
      const nextLine = j.stations[i+1].line;
      const segColor = LINES[st.line]?.color || '#888';
      const seg = document.createElement('div');
      seg.className = 'route-seg';
      seg.style.background = segColor;
      seg.id = `rseg-${i}`;
      container.appendChild(seg);
    }
  });
  updateRouteMap();
}

function updateRouteMap() {
  const j = currentJourney;
  j.stations.forEach((st, i) => {
    const dot = document.getElementById(`rdot-${i}`);
    if (!dot) return;
    dot.classList.remove('done','current','future');
    if (i < currentStationIdx) dot.classList.add('done');
    else if (i === currentStationIdx) dot.classList.add('current');
    else dot.classList.add('future');

    const seg = document.getElementById(`rseg-${i}`);
    if (seg) {
      seg.style.opacity = i < currentStationIdx ? '1' : '0.25';
    }
  });

  // scroll active dot into view
  const activeDot = document.getElementById(`rdot-${currentStationIdx}`);
  if (activeDot) activeDot.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}

function renderStation() {
  const j = currentJourney;
  const st = j.stations[currentStationIdx];
  const line = LINES[st.line];

  // Board colour
  const board = document.getElementById('station-board');
  board.style.borderColor = line.color;

  const bar = document.getElementById('board-line-bar');
  bar.style.background = line.color;
  bar.style.color = isLight(line.color) ? '#000' : '#fff';
  bar.innerHTML = `<span>${line.name}</span> <span style="opacity:0.7;font-weight:400;">${line.en} Line</span>`;

  // Furigana
  const fg = document.getElementById('board-furigana');
  if (furiganaMode === 'hiragana') { fg.textContent = st.hira; fg.classList.remove('hidden'); }
  else if (furiganaMode === 'katakana') { fg.textContent = st.kata; fg.classList.remove('hidden'); }
  else { fg.textContent = st.hira; fg.classList.add('hidden'); }

  document.getElementById('board-kanji').textContent = st.kanji;
  document.getElementById('board-romaji').textContent = st.romaji;
  document.getElementById('board-landmark').textContent = st.landmark || '';

  // Counter
  document.getElementById('station-counter').textContent =
    `Station ${currentStationIdx + 1} of ${j.stations.length}`;

  // Buttons
  document.getElementById('prev-btn').disabled = currentStationIdx === 0;
  const nextBtn = document.getElementById('next-btn');
  const isLast = currentStationIdx === j.stations.length - 1;
  nextBtn.textContent = isLast ? '🎉 Finish!' : 'Next station →';
  nextBtn.className = 'nav-btn next' + (isLast ? ' finish' : '');

  updateRouteMap();
}

function prevStation() {
  if (currentStationIdx > 0) { currentStationIdx--; renderStation(); }
}

function nextStation() {
  const j = currentJourney;
  if (currentStationIdx < j.stations.length - 1) {
    currentStationIdx++;
    renderStation();
  } else {
    showCompletion();
  }
}

function setFurigana(mode) {
  furiganaMode = mode;
  ['hira','kata','none'].forEach(k => {
    document.getElementById(`ftog-${k}`).classList.remove('active');
  });
  document.getElementById(`ftog-${mode === 'hiragana' ? 'hira' : mode === 'katakana' ? 'kata' : 'none'}`).classList.add('active');
  renderStation();
}

// =====================================================================
// COMPLETION
// =====================================================================
function showCompletion() {
  const j = currentJourney;
  const uniqueLines = [...new Set(j.stations.map(s => s.line))];
  const changes = uniqueLines.length - 1;

  document.getElementById('comp-subtitle').textContent = j.nameJp + ' — おわり！';
  document.getElementById('comp-stations').textContent = j.stations.length;
  document.getElementById('comp-lines').textContent = uniqueLines.length;
  document.getElementById('comp-changes').textContent = changes;

  showScreen('completion-screen');
}

function replayJourney() {
  startJourney(currentJourney.id);
}

// =====================================================================
// UTILS
// =====================================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goHome() { showScreen('home-screen'); }

function isLight(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 > 150;
}

// =====================================================================
// INIT
// =====================================================================
renderHome();
</script>
